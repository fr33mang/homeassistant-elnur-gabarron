name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can push back the manifest update
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in manifest.json
        run: |
          VERSION="${GITHUB_REF_NAME}"
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/elnur_gabarron/manifest.json > tmp.json \
            && mv tmp.json custom_components/elnur_gabarron/manifest.json

      - name: Commit manifest.json update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/elnur_gabarron/manifest.json
          git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
