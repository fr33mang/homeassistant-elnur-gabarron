name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in manifest.json
        run: |
          jq --arg v "${{ github.event.inputs.version }}" '.version = $v' \
            custom_components/elnur_gabarron/manifest.json > tmp.json \
            && mv tmp.json custom_components/elnur_gabarron/manifest.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/elnur_gabarron/manifest.json
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}"
          git tag "${{ github.event.inputs.version }}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          generate_release_notes: true
